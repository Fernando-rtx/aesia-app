<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AESIA FMOcc — Sistema de Marcación</title>
  <meta name="description" content="Sistema de control de entrada y salida del local de AESIA FMOcc — Asociación de Estudiantes de Ingeniería y Arquitectura." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ░░ SIDEBAR / NAV ░░ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <img src="assets/logo.jpg" alt="AESIA Logo" class="brand-logo" />
      <div class="brand-text">
        <span class="brand-name">AESIA</span>
        <span class="brand-sub">FMOcc · Marcación</span>
      </div>
    </div>

    <nav class="sidebar__nav">
      <button class="nav-item" data-nav="marcar" id="nav-marcar">
        <span class="nav-icon">🪪</span>
        <span class="nav-label">Marcar</span>
      </button>
      <button class="nav-item" data-nav="dashboard" id="nav-dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <div class="nav-separator">
        <span>Admin</span>
      </div>
      <button class="nav-item" data-nav="admin-members" id="nav-members">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Miembros</span>
      </button>
      <button class="nav-item" data-nav="historial" id="nav-historial">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Historial</span>
      </button>
    </nav>

    <div class="sidebar__footer">
      <div class="clock-widget">
        <div class="clock-time" id="clock">--:--:--</div>
        <div class="clock-date" id="clock-date">Cargando...</div>
      </div>
    </div>
  </aside>

  <!-- ░░ CONTENIDO PRINCIPAL ░░ -->
  <main class="main-wrapper">
    <div class="topbar-user">
       <span id="user-info">Cargando usuario...</span>
    </div>
    <div id="main-content" class="content-area"></div>
  </main>

  <!-- ░░ LOGIN OVERLAY ░░ -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-card glass-panel">
      <img src="assets/logo.jpg" alt="AESIA" class="login-logo"/>
      <h2>AESIA Marcación</h2>
      <p>Debes iniciar sesión con tu correo para marcar asistencia desde tu celular.</p>
      <button class="btn btn--primary" id="google-login-btn">
        <span>G</span> Iniciar Sesión con Google
      </button>
    </div>
  </div>

  <!-- ░░ MODAL ADMIN LOGIN ░░ -->
  <div class="modal-overlay hidden" id="admin-modal" role="dialog" aria-modal="true" aria-label="Acceso administrador">
    <div class="modal glass-panel">
      <div class="modal__icon">🔐</div>
      <h2 class="modal__title">Acceso Administrador</h2>
      <p class="modal__subtitle">Ingresa la contraseña para continuar</p>
      <div class="input-group">
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input
            type="password"
            id="admin-pass-input"
            class="input-field"
            placeholder="Contraseña"
            autocomplete="current-password"
          />
        </div>
      </div>
      <p class="admin-error" id="admin-error"></p>
      <div class="modal__actions">
        <button class="btn btn--ghost" id="admin-cancel-btn">Cancelar</button>
        <button class="btn btn--primary" id="admin-login-btn">Ingresar</button>
      </div>
    </div>
  </div>

  <!-- ░░ OVERLAY de fondo para modales ░░ -->
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
