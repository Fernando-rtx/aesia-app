<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AESIA FMOcc — Sistema de Marcación</title>
  <meta name="description" content="Sistema de control de entrada y salida del local de AESIA FMOcc — Asociación de Estudiantes de Ingeniería y Arquitectura." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ░░ SIDEBAR / NAV ░░ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <img src="assets/logo.jpg" alt="AESIA Logo" class="brand-logo" />
      <div class="brand-text">
        <span class="brand-name">AESIA</span>
        <span class="brand-sub">FMOcc · Marcación</span>
      </div>
    </div>

    <nav class="sidebar__nav">
      <button class="nav-item" data-nav="marcar" id="nav-marcar">
        <span class="nav-icon">🪪</span>
        <span class="nav-label">Marcar</span>
      </button>
      <button class="nav-item" data-nav="dashboard" id="nav-dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <div class="nav-separator">
        <span>Admin</span>
      </div>
      <button class="nav-item" data-nav="admin-members" id="nav-members">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Miembros</span>
      </button>
      <button class="nav-item" data-nav="historial" id="nav-historial">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Historial</span>
      </button>
    </nav>

    <div class="sidebar__footer">
      <div class="clock-widget">
        <div class="clock-time" id="clock">--:--:--</div>
        <div class="clock-date" id="clock-date">Cargando...</div>
      </div>
    </div>
  </aside>

  <!-- ░░ CONTENIDO PRINCIPAL ░░ -->
  <main class="main-wrapper">
    <div class="topbar-user">
       <span id="user-info">Cargando usuario...</span>
    </div>
    <div id="main-content" class="content-area"></div>
  </main>

  <!-- ░░ LOGIN OVERLAY ░░ -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-card glass-panel">
      <img src="assets/logo.jpg" alt="AESIA" class="login-logo"/>
      <h2 id="login-title">AESIA Marcación</h2>
      <p id="login-subtitle">Inicia sesión para registrar tu asistencia.</p>

      <!-- Alerta inline (errores / éxito) -->
      <div id="login-alert" class="login-alert hidden"></div>

      <!-- ── Formulario principal ── -->
      <form id="email-auth-form" class="email-auth-form" novalidate autocomplete="off">

        <!-- Nombre (solo en modo registro) -->
        <div class="input-group hidden" id="field-name">
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="auth-name" class="input-field"
              placeholder="Nombre completo" autocomplete="name"/>
          </div>
        </div>

        <!-- Carnet (solo en modo registro) -->
        <div class="input-group hidden" id="field-carnet">
          <div class="input-wrapper">
            <span class="input-icon">🪪</span>
            <input type="text" id="auth-carnet" class="input-field"
              placeholder="Carnet (ej: GP24006)" autocomplete="off" style="text-transform:uppercase"/>
          </div>
        </div>

        <!-- Email -->
        <div class="input-group" id="field-email">
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="auth-email" class="input-field"
              placeholder="Correo electrónico" autocomplete="email"/>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="input-group" id="field-pass">
          <div class="input-wrapper">
            <span class="input-icon">🔑</span>
            <input type="password" id="auth-pass" class="input-field"
              placeholder="Contraseña" autocomplete="current-password"/>
          </div>
        </div>

        <!-- Confirmar contraseña (solo en modo registro) -->
        <div class="input-group hidden" id="field-pass2">
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="auth-pass2" class="input-field"
              placeholder="Confirmar contraseña" autocomplete="new-password"/>
          </div>
        </div>

        <button type="submit" class="btn btn--primary login-submit-btn" id="email-auth-btn">
          Iniciar Sesión
        </button>
      </form>

      <!-- ── Acciones secundarias ── -->
      <div class="login-secondary">
        <button class="btn-link" id="toggle-register-btn">¿No tienes cuenta? Regístrate</button>
        <button class="btn-link" id="forgot-pass-btn">¿Olvidaste tu contraseña?</button>
      </div>

    </div>
  </div>

  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
